<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Visitor Kiosk</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      background-color: #cdc7b9; /* Boplan Grey */
      height: 100vh;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Hero banner */
    .hero {
      position: relative;
      height: 260px;
      background-image: url("Office Sign-In Screen_v3.png");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        rgba(0, 0, 0, 0.5),
        rgba(0, 0, 0, 0.2)
      );
    }

    .hero-text {
      position: relative;
      z-index: 1;
      color: white;
      padding: 2.5rem 3rem;
      font-size: 1.8rem;
      font-weight: 500;
    }

    /* Button area */
    .button-area {
      display: flex;
      justify-content: center;
      gap: 5rem;
      padding: 4rem 2rem;
      background-color: #cdc7b9;
    }

    .btn {
      background-color: #e73b2b; /* Boplan Red */
      color: white;
      text-decoration: none;
      padding: 1.3rem 4rem;
      font-size: 1.6rem;
      border-radius: 6px;
      font-weight: 600;
      min-width: 220px;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-text">
      Welcome to Boplan Warehouse! Please select Sign In or Sign Out below.
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="button-area">
    <a class="btn" href="signin.html">Sign In</a>
    <a class="btn" href="signout.html">Sign Out</a>
  </div>

</body>
</html>
