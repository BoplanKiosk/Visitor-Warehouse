<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warehouse Sign Out</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <iframe
    src="https://forms.office.com/Pages/ResponsePage.aspx?id=KNeh0xlqoUujJKYQlBSKiawKi05lWTZMtl4lHmgYgXJURTk2MElMRFNVRzMyMlFWREFNWFc1VUtRMC4u">
  </iframe>

  <script>
    let idleTimer;
    const IDLE_TIMEOUT = 45000; // 45 seconds

    function resetTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        window.location.href = "index.html";
      }, IDLE_TIMEOUT);
    }

    ["touchstart", "touchmove", "mousedown", "mousemove", "keydown"].forEach(event => {
      document.addEventListener(event, resetTimer, { passive: true });
    });

    resetTimer();
  </script>

</body>
</html>
